<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="../style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" integrity="sha512-iecdLmaskl7CVkqkXNQ/ZH/XLlvWZOJyj7Yy7tcenmpD1ypASozpmT/E0iPtmFIB46ZmdtAc9eNBvH0H/ZpiBw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Zogames - Mon Compte</title>
    
</head>
<body>

<section class="fx-col jc-between ai-center">

    <div class="container form-w4 form-h5 fx-col jc-between">
        <div class="fx-col gap-10">
            <div class="fx-row jc-end">
                <a href="index.html">
                    <i class="fa-solid fa-xmark"></i>
                </a>
            </div>
            <div id="user-pseudo" class="fx-row jc-evenly form-w4"></div>
        </div>

        <div class="fx-col jc-between gap-20 wrap">
            <div id="email" class="fx-row jc-between"></div>
            <div id="createdAt" class="fx-row jc-between"></div>
            <div id="updatedAt" class="fx-row jc-between"></div>
        </div>

        <div class="fx-row wrap gap-20">
            <div class="fx-col gap-30 grow jc-end">
                <div>
                    <button id="logout">Déconnexion</button>
                </div>
            </div>
        </div>
    </div>
   
</section>

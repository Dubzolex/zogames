<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="../style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" integrity="sha512-iecdLmaskl7CVkqkXNQ/ZH/XLlvWZOJyj7Yy7tcenmpD1ypASozpmT/E0iPtmFIB46ZmdtAc9eNBvH0H/ZpiBw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Zogames - Choisir son pseudo</title>
    
</head>
<body>

<section class="fx-col jc-between ai-center">

    <div class="container form-w4 form-h5 fx-col jc-between">
        <div class="fx-col gap-20">
            <div class="fx-row jc-between">
                <h3 id="name"></h3>
                <div id="code"></div>
            </div>
        </div>
        
        <div class="fx-col jc-between ai-center gap-40 wrap">
            <div>Vous n'avez pas de compte !</div>
             <div class="fx-col jc-between gap-20 wrap">
                <div>
                    <input id="pseudo" placeholder="Choississez un pseudo">
                </div>
                <div id="status"></div>
            </div>
        </div>

        <div class="fx-row gap-20">
            <div class="fx-col gap-30 grow jc-end">
                <div>
                    <button id="party">Rejoindre</button>
                </div>
            </div>
        </div>
    </div>
   
</section>


</body>
<script type="module" src="./index.js"></script>
<script type="module" src="./htmlConnect.js"></script>
 
</html>

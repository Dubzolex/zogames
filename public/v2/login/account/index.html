<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zogames - Mon Compte</title>
    <link rel="stylesheet" href="/v2/styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" integrity="sha512-iecdLmaskl7CVkqkXNQ/ZH/XLlvWZOJyj7Yy7tcenmpD1ypASozpmT/E0iPtmFIB46ZmdtAc9eNBvH0H/ZpiBw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
</head>

<body>
<header>
    <div class="fx-row jc-between ai-center w-1000 px-20">
        <h1>Zogames</h1>
        <div>
            <a href="/v2/login/"><i class="fa-solid fa-user"></i></a>
        </div>
    </div>
</header>

<section class="fx-col jc-center ai-center px-10 py-20 grow">
    <div class="container w-400 h-500 fx-col jc-between connexion">
        <div class="fx-col gap-40">
            <div class="fx-row jc-between ai-center">
                <em>Mon compte</em>
                <a href="/v2/">
                    <i class="fa-solid fa-xmark"></i>
                </a>
            </div>
            <div class="fx-col gap-20 ai-center">
                <div>Bonjour <strong id="pseudo"></strong> !</div>
            </div>
        </div>

        <div class="fx-col jc-between gap-20 wrap">
            <div id="email" class="fx-row jc-between"></div>
            <div id="createdAt" class="fx-row jc-between"></div>
            <div id="updatedAt" class="fx-row jc-between"></div>
            
        </div>
        <div class="fx-col gap-40 ai-center">
            <p><a href="/v2/login/credentials/" class="link">Changer de pseudo</a></p>
            <div class="fx-row jc-evenly gap-20">
                <button id="logout">Déconnexion</button>
            </div>
        </div>
    </div>
</section>
</body>


<script type="module" src="script.js"></script>
</html>

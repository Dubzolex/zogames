<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Loup Garou - Partie</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" integrity="sha512-iecdLmaskl7CVkqkXNQ/ZH/XLlvWZOJyj7Yy7tcenmpD1ypASozpmT/E0iPtmFIB46ZmdtAc9eNBvH0H/ZpiBw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
</head>
<body>
<header>
    <div class="logo-jeu">Loup Garou</div>
    <nav>
        <ul class="navlinks"></ul>
        <div class="toggle-menu"></div>

        <div id="btn-stop" onclick="gameStop()">
            <i class="fa-solid fa-hand" style="padding: 20px; font-size: 24px; cursor: pointer"></i> 
        </div>
    </nav>
    <div class="pseudo">
        <i class="fa-solid fa-user"></i>
        <span></span>
    </div> 
</header>

<section class="flex-column-between flex-center flex-1 gap-element fondjour">


<div class="carte">
    <div class="carte-flip">
        <div class="carte-back"></div>
        <div class="carte-front">
            <div class="carte-role flex-column-between flex-center">
                <h3 class="role-name"></h3>
                <div class="image-role" style="width: 100px; height:100px"></div>
                <p class="role-description-camp" style="font-style: italic;"></p>
                <p class="role-description-text"></p>
            </div>
        </div>
    </div>
</div>
<div class="timer">Attente...</div>


<div id="interface" class="container flex-column-between form transparent role">
        
        
</div>
    
<div class="maire-name" style="display: none;width:200px; text-align: center;"></div>     
<ul class="list-message transparent"></ul>


</section>
<script src="https://www.gstatic.com/firebasejs/8.2.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.2.1/firebase-database.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.2.1/firebase-auth.js"></script>
<script src="menu.js"></script>
<script src="game.js"></script>
<script src="affichage.js"></script>
<script src="server.js"></script>

</body>
</html>
